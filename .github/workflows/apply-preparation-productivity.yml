name: Apply Preparation Productivity Integration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-preparation-productivity.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply integration patch
        run: node scripts/apply-preparation-productivity.mjs
      - name: Commit integrated workspace
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/OnlinePreparationWorkspace.tsx src/components/OfflinePreparationWorkspace.tsx src/app-styles.ts scripts/apply-preparation-productivity.mjs .github/workflows/apply-preparation-productivity.yml
          git commit -m "Integrate preparation productivity assistant"
          git push origin HEAD:main
