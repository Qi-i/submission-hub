name: Apply two-mode compatibility patch

on:
  push:
    branches: [agent/unify-luminous-auth]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[two-mode-patch-done]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-luminous-auth
          fetch-depth: 0
      - name: Patch account metadata and Luminous X assertions
        run: |
          python - <<'PY'
          from pathlib import Path

          auth = Path('src/lib/auth.tsx')
          text = auth.read_text(encoding='utf-8')
          replacements = [
            (
              "export type AccountUiMode = 'classic' | 'luminous' | 'luminous-x'",
              "export type AccountUiMode = 'luminous' | 'luminous-x'",
            ),
            (
              "function isAccountUiMode(value: unknown): value is AccountUiMode {\n  return value === 'classic' || value === 'luminous' || value === 'luminous-x'\n}",
              "function isAccountUiMode(value: unknown): value is AccountUiMode {\n  return value === 'luminous' || value === 'luminous-x'\n}",
            ),
            (
              "  const uiMode = metadata?.[EXPERIENCE_META.uiMode]\n  const onboardingVersion = metadata?.[EXPERIENCE_META.onboardingVersion]\n  return {\n    ...(isAccountThemeMode(mode) ? { mode } : {}),\n    ...(isAccountUiMode(uiMode) ? { uiMode } : {}),",
              "  const rawUiMode = metadata?.[EXPERIENCE_META.uiMode]\n  const uiMode = rawUiMode === 'classic' ? 'luminous' : rawUiMode\n  const onboardingVersion = metadata?.[EXPERIENCE_META.onboardingVersion]\n  return {\n    ...(isAccountThemeMode(mode) ? { mode } : {}),\n    ...(isAccountUiMode(uiMode) ? { uiMode } : {}),",
            ),
          ]
          for old, new in replacements:
            if old not in text:
              raise SystemExit(f'missing auth block: {old[:70]}')
            text = text.replace(old, new, 1)
          auth.write_text(text, encoding='utf-8')

          test = Path('tests/visual/luminous-x-layout-check.mjs')
          text = test.read_text(encoding='utf-8')
          old = "if (currentLabel !== 'Luminous X' || !actionLabel.includes('经典')) failures.push(`${name}: UI switcher does not expose Luminous X and classic fallback`)"
          new = "if (currentLabel !== 'Luminous X' || actionLabel.includes('经典') || !actionLabel.includes('Luminous')) failures.push(`${name}: UI switcher still exposes the retired Classic interface`)"
          if old not in text:
            raise SystemExit('missing Luminous X switch assertion')
          test.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/auth.tsx tests/visual/luminous-x-layout-check.mjs
          git commit -m "Migrate Classic metadata to Luminous [two-mode-patch-done]"
          git push origin HEAD:agent/unify-luminous-auth
