name: One-shot final UI refinement

on:
  push:
    branches: [agent/refine-ui-alignment-surfaces]
    paths:
      - '.github/workflows/tmp-finish-ui-refinement.yml'

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refine-ui-alignment-surfaces
          fetch-depth: 0
      - name: Finish responsive portals and status surfaces
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected block not found in {path}: {old[:80]!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          prep = Path('src/components/PreparationWorkspace.tsx')
          replace_once(
              prep,
              "  const [luminousXActionSlot, setLuminousXActionSlot] = useState<HTMLElement | null>(null)\n\n  useEffect(() => {\n    setLuminousXActionSlot(uiMode === 'luminous-x' ? document.getElementById('lx-preparation-actions-slot') : null)\n  }, [uiMode])\n",
              "  const [luminousXActionSlot, setLuminousXActionSlot] = useState<HTMLElement | null>(null)\n  const [canPortalActions, setCanPortalActions] = useState(() => typeof window !== 'undefined' && window.matchMedia('(min-width: 1421px)').matches)\n\n  useEffect(() => {\n    setLuminousXActionSlot(uiMode === 'luminous-x' ? document.getElementById('lx-preparation-actions-slot') : null)\n  }, [uiMode])\n\n  useEffect(() => {\n    const media = window.matchMedia('(min-width: 1421px)')\n    const sync = () => setCanPortalActions(media.matches)\n    sync()\n    media.addEventListener('change', sync)\n    return () => media.removeEventListener('change', sync)\n  }, [])\n",
          )
          replace_once(
              prep,
              "      {(uiMode === 'luminous-x' && luminousXActionSlot ? createPortal(\n",
              "      {(uiMode === 'luminous-x' && canPortalActions && luminousXActionSlot ? createPortal(\n",
          )

          stats = Path('src/components/PersonalStatsUnified.tsx')
          replace_once(
              stats,
              "  const [luminousHeaderSlot, setLuminousHeaderSlot] = useState<HTMLElement | null>(null)\n  const [visible, setVisible] = useState<Record<TrendKey, boolean>>({\n",
              "  const [luminousHeaderSlot, setLuminousHeaderSlot] = useState<HTMLElement | null>(null)\n  const [canPortalControls, setCanPortalControls] = useState(() => typeof window !== 'undefined' && window.matchMedia('(min-width: 981px)').matches)\n  const [visible, setVisible] = useState<Record<TrendKey, boolean>>({\n",
          )
          replace_once(
              stats,
              "  useEffect(() => {\n    setLuminousHeaderSlot(uiMode === 'luminous' ? document.getElementById('luminous-header-center-slot') : null)\n  }, [uiMode])\n\n\n\n  const summary = useMemo(() => {\n",
              "  useEffect(() => {\n    setLuminousHeaderSlot(uiMode === 'luminous' ? document.getElementById('luminous-header-center-slot') : null)\n  }, [uiMode])\n\n  useEffect(() => {\n    const media = window.matchMedia('(min-width: 981px)')\n    const sync = () => setCanPortalControls(media.matches)\n    sync()\n    media.addEventListener('change', sync)\n    return () => media.removeEventListener('change', sync)\n  }, [])\n\n  const summary = useMemo(() => {\n",
          )
          replace_once(
              stats,
              "      {(uiMode === 'luminous' && luminousHeaderSlot ? createPortal(\n",
              "      {(uiMode === 'luminous' && canPortalControls && luminousHeaderSlot ? createPortal(\n",
          )

          offline = Path('src/components/OfflineDashboard.tsx')
          replace_once(
              offline,
              "        </div>\n        <div className=\"header-actions\">\n",
              "        </div>\n        <div id=\"luminous-header-center-slot\" className=\"luminous-header-center-slot\" aria-label=\"当前页面操作\" />\n        <div className=\"header-actions\">\n",
          )

          lx = Path('src/luminous-x-rebuild-corrections.css')
          text = lx.read_text(encoding='utf-8')
          text = text.replace("@media (max-width: 1220px) {\n  html[data-ui='luminous-x'] .lx-status-bar[data-page='preparation'] .lx-status-controls-host", "@media (max-width: 1420px) {\n  html[data-ui='luminous-x'] .lx-status-bar[data-page='preparation'] .lx-status-controls-host", 1)
          lx.write_text(text, encoding='utf-8')

          lum = Path('src/luminous-ui.css')
          text = lum.read_text(encoding='utf-8')
          dark_marker = "html[data-ui='luminous'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact h3 {"
          if dark_marker not in text:
              raise SystemExit('Luminous draft marker missing')
          dark_surfaces = """
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='preparing']) {
  background: linear-gradient(155deg, #1b1a37, #11182d) padding-box, linear-gradient(135deg, #34315a, rgba(139, 92, 246, .42)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='submitted']) {
  background: linear-gradient(155deg, #10283a, #11182d) padding-box, linear-gradient(135deg, #28506a, rgba(60, 245, 255, .34)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='under_review']) {
  background: linear-gradient(155deg, #2d2414, #11182d) padding-box, linear-gradient(135deg, #5d4a25, rgba(245, 158, 11, .38)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='revision']) {
  background: linear-gradient(155deg, #291936, #11182d) padding-box, linear-gradient(135deg, #513163, rgba(255, 79, 159, .36)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='accepted']) {
  background: linear-gradient(155deg, #132b22, #11182d) padding-box, linear-gradient(135deg, #28533f, rgba(34, 197, 94, .36)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='rejected']) {
  background: linear-gradient(155deg, #30191f, #11182d) padding-box, linear-gradient(135deg, #61303a, rgba(239, 68, 68, .38)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='withdrawn']) {
  background: linear-gradient(155deg, #1a2230, #11182d) padding-box, linear-gradient(135deg, #354153, rgba(100, 116, 139, .34)) border-box !important;
}

"""
          if "data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='preparing'])" not in text:
              text = text.replace(dark_marker, dark_surfaces + dark_marker, 1)
          lum.write_text(text, encoding='utf-8')

          Path('.github/workflows/tmp-finish-ui-refinement.yml').unlink()
          PY
      - name: Commit final refinements
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Finish responsive UI alignment and status surfaces"
          git push origin HEAD:agent/refine-ui-alignment-surfaces
