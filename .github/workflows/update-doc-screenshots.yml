name: Update Documentation Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/screenshot-refresh-v1.4.0'

permissions:
  contents: write

concurrency:
  group: update-doc-screenshots
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Verify sample privacy
        run: npm run check:privacy
      - name: Build visual harness
        run: npm run typecheck && npx vite build --config vite.config.visual.ts
      - name: Install Playwright and Chromium
        run: |
          npm install --no-save --no-package-lock playwright@1.52.0
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
      - name: Start preview server
        run: |
          npx vite preview --config vite.config.visual.ts --host 127.0.0.1 --port 4174 > /tmp/submission-hub-docs.log 2>&1 &
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4174/tests/visual/index.html >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/submission-hub-docs.log
          exit 1
      - name: Capture privacy-safe documentation screenshots
        run: |
          set -euxo pipefail
          mkdir -p docs/screenshots
          npx playwright screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .paper-card-v3" "http://127.0.0.1:4174/tests/visual/index.html?view=dashboard&theme=light" docs/screenshots/dashboard-papers.png
          npx playwright screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .stats-panel" "http://127.0.0.1:4174/tests/visual/index.html?view=stats&theme=light" docs/screenshots/statistics-page.png
          npx playwright screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .preparation-workspace" "http://127.0.0.1:4174/tests/visual/index.html?view=preparation&theme=light" docs/screenshots/preparation-page.png
          npx playwright screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .paper-card-v3" "http://127.0.0.1:4174/tests/visual/index.html?view=dashboard&theme=dark" docs/screenshots/dashboard-dark.png
          npx playwright screenshot --timeout=45000 --browser chromium --full-page --viewport-size="390,844" --wait-for-selector="html[data-visual-ready='true'] .paper-card-v3" "http://127.0.0.1:4174/tests/visual/index.html?view=dashboard&theme=light" docs/screenshots/dashboard-mobile.png
          npx playwright screenshot --timeout=45000 --browser chromium --viewport-size="1440,1000" --wait-for-selector="html[data-modal-scroll-ready='true'] .compact-form-footer" "http://127.0.0.1:4174/tests/visual/index.html?view=editor&theme=light" docs/screenshots/editor-form.png
      - name: Commit updated screenshots
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "Documentation screenshots are already current."
            exit 0
          fi
          git commit -m "Refresh privacy-safe documentation screenshots"
          git push
