name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deployed_sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_ID: ${{ vars.VITE_ADMIN_ID }}
      - name: Verify current dashboard is bundled
        run: grep -R "2026-07-12-journal-sync" dist/assets >/dev/null
      - id: version
        name: Write deployment version
        run: |
          sha="$(git rev-parse HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          printf '{"sha":"%s","built_at":"%s"}\n' "$sha" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > dist/build-info.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live site serves this build
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_SHA: ${{ needs.build.outputs.deployed_sha }}
        run: |
          url="${PAGE_URL%/}/build-info.json?run=${GITHUB_RUN_ID}"
          for attempt in $(seq 1 18); do
            body="$(curl --fail --silent --show-error --location --max-time 15 "$url" || true)"
            if printf '%s' "$body" | grep --fixed-strings --quiet "$EXPECTED_SHA"; then
              echo "Verified live Pages build: $EXPECTED_SHA"
              exit 0
            fi
            echo "Waiting for Pages CDN propagation ($attempt/18)..."
            sleep 5
          done
          echo "Live site did not return expected build SHA: $EXPECTED_SHA"
          exit 1

  report:
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Record deployment result
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOYED_SHA: ${{ needs.build.outputs.deployed_sha }}
        run: |
          if [ "$BUILD_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            result="SUCCESS"
          else
            result="FAILURE"
          fi
          body="Pages deployment **${result}**\n\n- SHA: \`${DEPLOYED_SHA:-unknown}\`\n- Build: \`${BUILD_RESULT}\`\n- Deploy and live SHA check: \`${DEPLOY_RESULT}\`\n- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue comment 39 --repo "$GITHUB_REPOSITORY" --body "$body"
