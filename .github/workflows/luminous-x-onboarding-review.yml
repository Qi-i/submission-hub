name: Verify Luminous interfaces and onboarding

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/visual/**'
      - 'vite.config.visual.ts'
      - '.github/workflows/luminous-x-onboarding-review.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/visual/**'
      - 'vite.config.visual.ts'
      - '.github/workflows/luminous-x-onboarding-review.yml'

permissions:
  contents: write

jobs:
  patch-responsive-portals:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Finish responsive portals and status surfaces
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> bool:
              text = path.read_text(encoding='utf-8')
              if new in text:
                  return False
              if old not in text:
                  raise SystemExit(f'Expected block not found in {path}: {old[:80]!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
              return True

          prep = Path('src/components/PreparationWorkspace.tsx')
          replace_once(
              prep,
              "  const [luminousXActionSlot, setLuminousXActionSlot] = useState<HTMLElement | null>(null)\n\n  useEffect(() => {\n    setLuminousXActionSlot(uiMode === 'luminous-x' ? document.getElementById('lx-preparation-actions-slot') : null)\n  }, [uiMode])\n",
              "  const [luminousXActionSlot, setLuminousXActionSlot] = useState<HTMLElement | null>(null)\n  const [canPortalActions, setCanPortalActions] = useState(() => typeof window !== 'undefined' && window.matchMedia('(min-width: 1421px)').matches)\n\n  useEffect(() => {\n    setLuminousXActionSlot(uiMode === 'luminous-x' ? document.getElementById('lx-preparation-actions-slot') : null)\n  }, [uiMode])\n\n  useEffect(() => {\n    const media = window.matchMedia('(min-width: 1421px)')\n    const sync = () => setCanPortalActions(media.matches)\n    sync()\n    media.addEventListener('change', sync)\n    return () => media.removeEventListener('change', sync)\n  }, [])\n",
          )
          text = prep.read_text(encoding='utf-8')
          text = text.replace("uiMode === 'luminous-x' && luminousXActionSlot ? createPortal(", "uiMode === 'luminous-x' && canPortalActions && luminousXActionSlot ? createPortal(")
          prep.write_text(text, encoding='utf-8')

          stats = Path('src/components/PersonalStatsUnified.tsx')
          replace_once(
              stats,
              "  const [luminousHeaderSlot, setLuminousHeaderSlot] = useState<HTMLElement | null>(null)\n  const [visible, setVisible] = useState<Record<TrendKey, boolean>>({\n",
              "  const [luminousHeaderSlot, setLuminousHeaderSlot] = useState<HTMLElement | null>(null)\n  const [canPortalControls, setCanPortalControls] = useState(() => typeof window !== 'undefined' && window.matchMedia('(min-width: 981px)').matches)\n  const [visible, setVisible] = useState<Record<TrendKey, boolean>>({\n",
          )
          text = stats.read_text(encoding='utf-8')
          effect = "  useEffect(() => {\n    setLuminousHeaderSlot(uiMode === 'luminous' ? document.getElementById('luminous-header-center-slot') : null)\n  }, [uiMode])\n"
          media_effect = effect + "\n  useEffect(() => {\n    const media = window.matchMedia('(min-width: 981px)')\n    const sync = () => setCanPortalControls(media.matches)\n    sync()\n    media.addEventListener('change', sync)\n    return () => media.removeEventListener('change', sync)\n  }, [])\n"
          if 'setCanPortalControls(media.matches)' not in text:
              if effect not in text:
                  raise SystemExit('Stats portal effect was not found')
              text = text.replace(effect, media_effect, 1)
          text = text.replace("uiMode === 'luminous' && luminousHeaderSlot ? createPortal(", "uiMode === 'luminous' && canPortalControls && luminousHeaderSlot ? createPortal(")
          text = text.replace("  }, [uiMode])\n\n\n\n  const summary", "  }, [uiMode])\n\n  const summary")
          stats.write_text(text, encoding='utf-8')

          offline = Path('src/components/OfflineDashboard.tsx')
          text = offline.read_text(encoding='utf-8')
          slot = '        <div id="luminous-header-center-slot" className="luminous-header-center-slot" aria-label="当前页面操作" />\n'
          if slot not in text:
              needle = '        </div>\n        <div className="header-actions">\n'
              if needle not in text:
                  raise SystemExit('Offline header action boundary not found')
              text = text.replace(needle, '        </div>\n' + slot + '        <div className="header-actions">\n', 1)
              offline.write_text(text, encoding='utf-8')

          lx = Path('src/luminous-x-rebuild-corrections.css')
          text = lx.read_text(encoding='utf-8')
          text = text.replace("@media (max-width: 1220px) {\n  html[data-ui='luminous-x'] .lx-status-bar[data-page='preparation'] .lx-status-controls-host", "@media (max-width: 1420px) {\n  html[data-ui='luminous-x'] .lx-status-bar[data-page='preparation'] .lx-status-controls-host", 1)
          lx.write_text(text, encoding='utf-8')

          lum = Path('src/luminous-ui.css')
          text = lum.read_text(encoding='utf-8')
          marker = "html[data-ui='luminous'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact h3 {"
          dark_surfaces = """html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='preparing']) {
  background: linear-gradient(155deg, #1b1a37, #11182d) padding-box, linear-gradient(135deg, #34315a, rgba(139, 92, 246, .42)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='submitted']) {
  background: linear-gradient(155deg, #10283a, #11182d) padding-box, linear-gradient(135deg, #28506a, rgba(60, 245, 255, .34)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='under_review']) {
  background: linear-gradient(155deg, #2d2414, #11182d) padding-box, linear-gradient(135deg, #5d4a25, rgba(245, 158, 11, .38)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='revision']) {
  background: linear-gradient(155deg, #291936, #11182d) padding-box, linear-gradient(135deg, #513163, rgba(255, 79, 159, .36)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='accepted']) {
  background: linear-gradient(155deg, #132b22, #11182d) padding-box, linear-gradient(135deg, #28533f, rgba(34, 197, 94, .36)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='rejected']) {
  background: linear-gradient(155deg, #30191f, #11182d) padding-box, linear-gradient(135deg, #61303a, rgba(239, 68, 68, .38)) border-box !important;
}
html[data-ui='luminous'][data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='withdrawn']) {
  background: linear-gradient(155deg, #1a2230, #11182d) padding-box, linear-gradient(135deg, #354153, rgba(100, 116, 139, .34)) border-box !important;
}

"""
          if "data-theme='dark'] .paper-card-v3:has(.paper-status-area[data-status='preparing'])" not in text:
              if marker not in text:
                  raise SystemExit('Luminous draft marker missing')
              text = text.replace(marker, dark_surfaces + marker, 1)
              lum.write_text(text, encoding='utf-8')
          PY
      - name: Commit refinements when needed
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/PreparationWorkspace.tsx src/components/PersonalStatsUnified.tsx src/components/OfflineDashboard.tsx src/luminous-ui.css src/luminous-x-rebuild-corrections.css
          git commit -m "Finish responsive UI alignment and status surfaces"
          git push origin HEAD:${{ github.head_ref }}

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Typecheck and build visual harness
        run: npm run typecheck && npx vite build --config vite.config.visual.ts
      - name: Install browser runtime
        run: |
          npm install --no-save --no-package-lock playwright@1.52.0
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
      - name: Start visual preview
        run: |
          npx vite preview --config vite.config.visual.ts --host 127.0.0.1 --port 4174 > /tmp/submission-hub-focused.log 2>&1 &
          for i in {1..40}; do
            curl -fsS http://127.0.0.1:4174/tests/visual/index.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/submission-hub-focused.log
          exit 1
      - name: Review 1 - compact Luminous X layouts
        run: node tests/visual/luminous-x-compact-check.mjs
      - name: Review 2 - cross-interface coherence and modal layering
        if: always()
        run: node tests/visual/luminous-coherence-check.mjs
      - name: Review 3 - two-mode migration and email authentication
        if: always()
        run: node tests/visual/email-auth-check.mjs
      - name: Review 4 - remembered navigation
        if: always()
        run: node tests/visual/navigation-memory-check.mjs
      - name: Review 5 - first-run guide and defaults
        if: always()
        run: node tests/visual/first-run-guide-check.mjs
      - name: Capture focused comparison pages
        if: always()
        run: |
          mkdir -p focused-review
          npx playwright screenshot --timeout=45000 --browser chromium --viewport-size="1440,1000" --wait-for-selector=".preparation-workspace" "http://127.0.0.1:4174/tests/visual/index.html?view=preparation&theme=light&ui=luminous" focused-review/luminous-preparation-light.png
          npx playwright screenshot --timeout=45000 --browser chromium --viewport-size="1440,1000" --wait-for-selector=".preparation-workspace" "http://127.0.0.1:4174/tests/visual/index.html?view=preparation&theme=dark&ui=luminous" focused-review/luminous-preparation-dark.png
          npx playwright screenshot --timeout=45000 --browser chromium --viewport-size="1440,1000" --wait-for-selector=".preparation-workspace" "http://127.0.0.1:4174/tests/visual/index.html?view=preparation&theme=light&ui=luminous-x" focused-review/luminous-x-preparation-light.png
          npx playwright screenshot --timeout=45000 --browser chromium --viewport-size="1440,1000" --wait-for-selector=".preparation-workspace" "http://127.0.0.1:4174/tests/visual/index.html?view=preparation&theme=dark&ui=luminous-x" focused-review/luminous-x-preparation-dark.png
          npx playwright screenshot --timeout=45000 --browser chromium --viewport-size="1280,900" --wait-for-selector=".first-run-guide" "http://127.0.0.1:4174/tests/visual/index.html?view=dashboard&theme=light&ui=luminous-x&guide=1" focused-review/luminous-x-first-run-guide.png
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: luminous-two-interface-review
          path: |
            focused-review/*
            /tmp/submission-hub-focused.log
          retention-days: 14
