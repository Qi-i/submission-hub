name: Capture Visual Review

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/visual/**'
      - 'vite.config.visual.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/visual-review.yml'

permissions:
  contents: read

concurrency:
  group: visual-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Typecheck and build visual harness
        run: npm run typecheck && npx vite build --config vite.config.visual.ts
      - name: Install Chromium
        run: npx --yes playwright@1.52.0 install --with-deps chromium > /tmp/playwright-install.log 2>&1
      - name: Start preview server
        run: |
          npx vite preview --config vite.config.visual.ts --host 127.0.0.1 --port 4174 > /tmp/submission-hub-visual.log 2>&1 &
          echo $! > /tmp/submission-hub-visual.pid
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4174/tests/visual/index.html >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/submission-hub-visual.log
          exit 1
      - name: Capture light desktop pages
        run: |
          set -euxo pipefail
          mkdir -p visual-review
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .paper-card-v3" "http://127.0.0.1:4174/tests/visual/index.html?view=dashboard&theme=light" visual-review/dashboard-light-desktop.png
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .stats-panel" "http://127.0.0.1:4174/tests/visual/index.html?view=stats&theme=light" visual-review/statistics-light-desktop.png
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .preparation-workspace" "http://127.0.0.1:4174/tests/visual/index.html?view=preparation&theme=light" visual-review/preparation-light-desktop.png
      - name: Verify dashboard geometry
        run: |
          set -euxo pipefail
          npx --yes @playwright/test@1.52.0 test tests/visual/layout.spec.ts --reporter=line --workers=1
      - name: Capture editor modal diagnostics
        if: always()
        run: |
          set -euxo pipefail
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --viewport-size="1440,1000" --wait-for-selector="html[data-modal-rendered='true'] .compact-form-modal" "http://127.0.0.1:4174/tests/visual/index.html?view=editor&theme=light" visual-review/editor-rendered-light-desktop.png
      - name: Verify editor modal scrolling
        run: |
          set -euxo pipefail
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --viewport-size="1440,1000" --wait-for-selector="html[data-modal-scroll-ready='true'] .compact-form-footer" "http://127.0.0.1:4174/tests/visual/index.html?view=editor&theme=light" visual-review/editor-bottom-light-desktop.png
      - name: Capture dark desktop pages
        run: |
          set -euxo pipefail
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .paper-card-v3" "http://127.0.0.1:4174/tests/visual/index.html?view=dashboard&theme=dark" visual-review/dashboard-dark-desktop.png
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --full-page --viewport-size="1440,1200" --wait-for-selector="html[data-visual-ready='true'] .preparation-workspace" "http://127.0.0.1:4174/tests/visual/index.html?view=preparation&theme=dark" visual-review/preparation-dark-desktop.png
      - name: Capture mobile pages
        run: |
          set -euxo pipefail
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --full-page --viewport-size="390,844" --wait-for-selector="html[data-visual-ready='true'] .paper-card-v3" "http://127.0.0.1:4174/tests/visual/index.html?view=dashboard&theme=light" visual-review/dashboard-light-mobile.png
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --full-page --viewport-size="390,844" --wait-for-selector="html[data-visual-ready='true'] .stats-panel" "http://127.0.0.1:4174/tests/visual/index.html?view=stats&theme=light" visual-review/statistics-light-mobile.png
          npx --yes playwright@1.52.0 screenshot --timeout=45000 --browser chromium --full-page --viewport-size="390,844" --wait-for-selector="html[data-visual-ready='true'] .preparation-workspace" "http://127.0.0.1:4174/tests/visual/index.html?view=preparation&theme=light" visual-review/preparation-light-mobile.png
      - name: Upload screenshots and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: submission-hub-visual-review
          path: |
            visual-review/*.png
            /tmp/submission-hub-visual.log
          if-no-files-found: warn
          retention-days: 14
