name: One-shot Luminous navigation repair

on:
  push:
    branches: [agent/fix-luminous-primary-navigation]
    paths:
      - '.github/workflows/tmp-fix-luminous-navigation.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-luminous-primary-navigation
          fetch-depth: 0
      - name: Stabilize four-page Luminous header geometry
        run: |
          python - <<'PY'
          from pathlib import Path

          stats = Path('src/components/PersonalStatsUnified.tsx')
          text = stats.read_text(encoding='utf-8')
          text = text.replace("window.matchMedia('(min-width: 981px)').matches", "window.matchMedia('(min-width: 1681px)').matches")
          text = text.replace("window.matchMedia('(min-width: 981px)')", "window.matchMedia('(min-width: 1681px)')")
          stats.write_text(text, encoding='utf-8')

          css = Path('src/luminous-ui.css')
          text = css.read_text(encoding='utf-8')
          marker = "html[data-ui='luminous'] .app-header .luminous-header-center-slot {\n"
          desktop_rules = """/* Keep the four primary destinations identical on every Luminous page. */
html[data-ui='luminous'] .header-tabs button {
  white-space: nowrap !important;
  word-break: keep-all !important;
  writing-mode: horizontal-tb !important;
  line-height: 1.2 !important;
}

@media (min-width: 1181px) {
  html[data-ui='luminous'] .app-header.app-header-refined {
    display: grid !important;
    grid-template-columns: max-content minmax(0, 1fr) max-content !important;
    align-items: center !important;
    column-gap: 12px !important;
  }

  html[data-ui='luminous'] .app-header .header-left-cluster {
    flex: none !important;
    min-width: max-content !important;
    gap: 18px !important;
  }

  html[data-ui='luminous'] .app-header .header-brand {
    flex: 0 0 auto !important;
    min-width: 230px !important;
  }

  html[data-ui='luminous'] .app-header .header-tabs {
    flex: 0 0 auto !important;
    min-width: max-content !important;
    flex-wrap: nowrap !important;
  }

  html[data-ui='luminous'] .app-header .header-tabs button {
    flex: 0 0 auto !important;
    min-width: 78px !important;
  }

  html[data-ui='luminous'] .app-header .header-actions {
    flex: 0 0 auto !important;
    min-width: max-content !important;
  }
}

"""
          if desktop_rules not in text:
              if marker not in text:
                  raise SystemExit('Luminous center-slot marker not found')
              text = text.replace(marker, desktop_rules + marker, 1)

          old_slot = """html[data-ui='luminous'] .app-header .luminous-header-center-slot {
  min-width: 0;
  flex: 1 1 auto;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 10px;
}
"""
          new_slot = """html[data-ui='luminous'] .app-header .luminous-header-center-slot {
  min-width: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 10px;
  overflow: hidden;
}
"""
          if old_slot in text:
              text = text.replace(old_slot, new_slot, 1)

          old_portal = """html[data-ui='luminous'] .luminous-header-center-slot .stats-module-controls-portal {
  max-width: 100%;
  margin: 0 !important;
  justify-self: auto !important;
}
"""
          new_portal = """html[data-ui='luminous'] .luminous-header-center-slot .stats-module-controls-portal {
  max-width: 100%;
  min-width: max-content;
  flex-wrap: nowrap !important;
  margin: 0 !important;
  justify-self: auto !important;
  overflow-x: auto;
  scrollbar-width: none;
}

html[data-ui='luminous'] .luminous-header-center-slot .stats-module-controls-portal::-webkit-scrollbar {
  display: none;
}
"""
          if old_portal in text:
              text = text.replace(old_portal, new_portal, 1)

          text = text.replace("@media (max-width: 980px) {\n  html[data-ui='luminous'] .app-header .luminous-header-center-slot", "@media (max-width: 1680px) {\n  html[data-ui='luminous'] .app-header .luminous-header-center-slot", 1)
          css.write_text(text, encoding='utf-8')

          test = Path('tests/visual/luminous-layout-check.mjs')
          text = test.read_text(encoding='utf-8')
          anchor = """  const statisticsLight = await openView({ view: 'stats', theme: 'light', selector: '.stats-panel' })
  await inspectPage(statisticsLight, 'luminous statistics light')
  await statisticsLight.close()

"""
          nav_check = """  const navigationFixture = await openView({
    view: 'dashboard',
    theme: 'light',
    viewport: { width: 2048, height: 900 },
    selector: '.paper-card-v3',
  })
  const navigationGeometry = await navigationFixture.evaluate(() => {
    const fixture = document.createElement('header')
    fixture.className = 'app-header app-header-refined luminous-navigation-fixture'
    fixture.style.position = 'fixed'
    fixture.style.inset = '8px 8px auto 8px'
    fixture.style.zIndex = '20000'
    fixture.innerHTML = `
      <div class="header-left-cluster">
        <div class="header-brand"><div class="header-logo">SH</div><div><div class="header-title">Submission Hub</div><div class="header-subtitle">学术投稿与成果管理</div></div></div>
        <nav class="header-tabs" aria-label="主导航测试">
          <button>投稿准备</button><button>投稿管理</button><button class="active">个人统计</button><button>后台管理</button>
        </nav>
      </div>
      <div class="luminous-header-center-slot"><div class="stats-module-controls stats-module-controls-portal"><button>核心概览</button><button>过程指标</button><button>趋势图</button><button>分布概览</button><button>恢复默认</button></div></div>
      <div class="header-actions"><button class="btn btn-ghost btn-sm">导入</button><button class="btn btn-ghost btn-sm">备份</button><button class="btn btn-ghost btn-sm">设置</button></div>`
    document.body.appendChild(fixture)

    const inspect = () => {
      const nav = fixture.querySelector('.header-tabs')
      const center = fixture.querySelector('.luminous-header-center-slot')
      const actions = fixture.querySelector('.header-actions')
      const buttons = Array.from(fixture.querySelectorAll('.header-tabs button'))
      return {
        header: fixture.getBoundingClientRect().toJSON(),
        nav: nav?.getBoundingClientRect().toJSON(),
        center: center?.getBoundingClientRect().toJSON(),
        actions: actions?.getBoundingClientRect().toJSON(),
        buttons: buttons.map(button => ({
          rect: button.getBoundingClientRect().toJSON(),
          whiteSpace: getComputedStyle(button).whiteSpace,
          writingMode: getComputedStyle(button).writingMode,
          text: button.textContent?.trim() || '',
        })),
      }
    }

    const withControls = inspect()
    const center = fixture.querySelector('.luminous-header-center-slot')
    if (center) center.innerHTML = ''
    const withoutControls = inspect()
    fixture.remove()
    return { withControls, withoutControls }
  })
  const navWith = navigationGeometry.withControls
  const navWithout = navigationGeometry.withoutControls
  navWith.buttons.forEach((button, index) => {
    if (button.whiteSpace !== 'nowrap') failures.push(`luminous primary navigation ${index + 1}: text can wrap`)
    if (!button.writingMode.startsWith('horizontal')) failures.push(`luminous primary navigation ${index + 1}: writing mode is not horizontal`)
    if (button.rect.height > 44 || button.rect.width < 70) failures.push(`luminous primary navigation ${index + 1}: invalid button geometry ${button.rect.width}x${button.rect.height}`)
    const comparison = navWithout.buttons[index]
    if (comparison && (Math.abs(button.rect.left - comparison.rect.left) > 1 || Math.abs(button.rect.width - comparison.rect.width) > 1)) {
      failures.push(`luminous primary navigation ${index + 1}: position changes between pages`)
    }
  })
  if (navWith.nav && navWith.center && navWith.nav.right > navWith.center.right + 1) failures.push('luminous primary navigation: navigation escapes its fixed left lane')
  if (navWith.nav && navWith.actions && navWith.nav.right > navWith.actions.left - 4) failures.push('luminous primary navigation: navigation overlaps header actions')
  details['luminous four-page navigation'] = navigationGeometry
  await navigationFixture.close()

"""
          if nav_check not in text:
              if anchor not in text:
                  raise SystemExit('Luminous statistics test anchor not found')
              text = text.replace(anchor, anchor + nav_check, 1)
          test.write_text(text, encoding='utf-8')

          Path('.github/workflows/tmp-fix-luminous-navigation.yml').unlink()
          PY
      - name: Commit repaired navigation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix Luminous four-page navigation geometry"
          git push origin HEAD:agent/fix-luminous-primary-navigation
