name: Harden Luminous coherence selectors

on:
  push:
    branches: [agent/unify-luminous-auth]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[coherence-hardening-done]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-luminous-auth
          fetch-depth: 0
      - name: Append the final specificity bridge
        run: |
          cat >> src/luminous-coherence.css <<'CSS'

/* Specificity bridge over the retired per-mode corrections. */
html[data-ui='luminous'] .preparation-workspace .prep-overview-drafts,
html[data-ui='luminous'] .preparation-workspace .prep-overview-journals,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-drafts,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-journals {
  height: var(--coh-panel-height) !important;
  min-height: var(--coh-panel-height) !important;
  max-height: var(--coh-panel-height) !important;
  grid-template-rows: 58px minmax(0, 1fr) !important;
}

html[data-ui='luminous'] .preparation-workspace .prep-overview-draft-list,
html[data-ui='luminous'] .preparation-workspace .prep-overview-journal-list,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-draft-list,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-journal-list {
  grid-auto-rows: var(--coh-overview-row-height) !important;
  gap: 8px !important;
  padding: 10px !important;
}

html[data-ui='luminous'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact,
html[data-ui='luminous'] .preparation-workspace .prep-overview-journal-list .prep-journal-overview-card,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-journal-list .prep-journal-overview-card {
  width: 100% !important;
  height: var(--coh-overview-row-height) !important;
  min-height: var(--coh-overview-row-height) !important;
  max-height: var(--coh-overview-row-height) !important;
  margin: 0 !important;
  overflow: hidden !important;
  border: 1px solid var(--coh-card-border) !important;
  border-radius: var(--coh-card-radius) !important;
  background: var(--coh-card-bg) !important;
  box-shadow: var(--coh-card-shadow) !important;
}

html[data-ui='luminous'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact {
  padding: 0 !important;
}

html[data-ui='luminous-x'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact {
  padding: 0 !important;
}

html[data-ui='luminous'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact .prep-draft-main,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact .prep-draft-main {
  height: 100% !important;
  min-height: 0 !important;
  padding: 9px 116px 8px 12px !important;
  grid-template-rows: auto auto 3px auto !important;
  gap: 4px !important;
}

html[data-ui='luminous'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact .prep-readiness-note,
html[data-ui='luminous'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact .prep-draft-foot,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact .prep-readiness-note,
html[data-ui='luminous-x'] .preparation-workspace .prep-overview-draft-list .prep-draft-card.compact .prep-draft-foot {
  display: none !important;
}

html[data-ui='luminous'] body .modal-overlay,
html[data-ui='luminous-x'] body .modal-overlay {
  position: fixed !important;
  inset: 0 !important;
  z-index: 30000 !important;
  overflow: auto !important;
}

html[data-ui='luminous'] body .modal-overlay > .modal,
html[data-ui='luminous-x'] body .modal-overlay > .modal {
  max-height: calc(100dvh - 36px) !important;
  overflow: hidden !important;
}

@media (max-width: 760px) {
  html[data-ui='luminous'] .preparation-workspace .prep-overview-drafts,
  html[data-ui='luminous'] .preparation-workspace .prep-overview-journals,
  html[data-ui='luminous-x'] .preparation-workspace .prep-overview-drafts,
  html[data-ui='luminous-x'] .preparation-workspace .prep-overview-journals {
    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;
  }
}
CSS
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/luminous-coherence.css
          git commit -m "Harden equal-card and modal selectors [coherence-hardening-done]"
          git push origin HEAD:agent/unify-luminous-auth
