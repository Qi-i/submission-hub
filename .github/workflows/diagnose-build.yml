name: Build Diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Capture privacy and build output
        run: |
          set +e
          npm run check:privacy > privacy.log 2>&1
          privacy_code=$?
          npm run build > build.log 2>&1
          build_code=$?
          cat privacy.log
          cat build.log
          printf '%s\n' "$privacy_code" > privacy-exit-code.txt
          printf '%s\n' "$build_code" > build-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            privacy.log
            privacy-exit-code.txt
            build.log
            build-exit-code.txt
