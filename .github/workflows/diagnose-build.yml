name: Build Diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Capture build output
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          cat build.log
          echo "$code" > build-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            build.log
            build-exit-code.txt
